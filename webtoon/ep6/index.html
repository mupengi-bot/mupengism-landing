<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>무펭이 사가 EP6 — 같이 맞추는 법</title>
  <meta name="description" content="무펭이 사가 EP6 같이 맞추는 법 — 혼자 만든 탑 이후, 무펭이와 크래프트가 함께 조율하는 이야기." />
  <style>
    :root { color-scheme: dark; --bg:#07111f; --panel:#0f1b2e; --text:#eef7ff; --muted:#9fb3c8; --accent:#10A37F; }
    * { box-sizing: border-box; }
    body { margin:0; background: radial-gradient(circle at top, #12345a 0, var(--bg) 38rem); color:var(--text); font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
    header { max-width: 920px; margin: 0 auto; padding: 48px 18px 28px; text-align: center; }
    .eyebrow { color: var(--accent); font-weight: 800; letter-spacing: .08em; }
    h1 { margin: 10px 0 12px; font-size: clamp(34px, 7vw, 68px); line-height: 1.05; }
    p { margin: 0 auto; max-width: 720px; color: var(--muted); line-height: 1.65; font-size: 17px; }
    main { max-width: 920px; margin: 0 auto; padding: 0 14px 64px; }
    .cut { margin: 26px auto; padding: 10px; background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.10); border-radius: 22px; box-shadow: 0 18px 55px rgba(0,0,0,.28); }
    .cut img { display:block; width:100%; border-radius: 14px; background:#0b1320; }
    footer { padding: 28px 18px 60px; text-align:center; color: var(--muted); }
    a { color: #7dd3fc; }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">MUPEONGI SAGA · EP 6</div>
    <h1>같이 맞추는 법</h1>
    <p>혼자 만든 탑이 폭주한 뒤, 크래프트는 자신이 연결을 만든 것이 아니라 막고 있었다는 사실을 받아들인다. 무펭이는 서로 먼 두 조율점을 가리키며, 창조가 혼자가 아니라 함께 맞추는 일임을 보여준다.</p>
  </header>
  <main>
    <section class="cut"><img src="01.jpg" alt="EP6 01" loading="eager"></section>
    <section class="cut"><img src="02.jpg" alt="EP6 02" loading="lazy"></section>
    <section class="cut"><img src="03.jpg" alt="EP6 03" loading="lazy"></section>
    <section class="cut"><img src="04.jpg" alt="EP6 04" loading="lazy"></section>
    <section class="cut"><img src="05.jpg" alt="EP6 05" loading="lazy"></section>
    <section class="cut"><img src="06.jpg" alt="EP6 06" loading="lazy"></section>
    <section class="cut"><img src="07.jpg" alt="EP6 07" loading="lazy"></section>
    <section class="cut"><img src="08.jpg" alt="EP6 08" loading="lazy"></section>
    <section class="cut"><img src="09.jpg" alt="EP6 09" loading="lazy"></section>
    <section class="cut"><img src="10.jpg" alt="EP6 10" loading="lazy"></section>
  </main>
  <footer>EP6 임시 공개 페이지 · 정식 /webtoon 갤러리에도 커밋 완료</footer>
</body>
</html>
